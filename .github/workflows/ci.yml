name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pin the floor (20.9.0 matches `engines` in package.json) so a
        # regression that only appears on 20.9–20.12 still fails CI.
        node-version: [20.9.0, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test:cover

      - run: pnpm run build

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Dev tooling (ESLint 10, Prettier) requires Node >= 20.12 (util.styleText),
      # above the library's 20.9.0 runtime floor — so run it once on a modern
      # Node rather than across the runtime matrix above.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test:format

      - run: pnpm run test:lint
