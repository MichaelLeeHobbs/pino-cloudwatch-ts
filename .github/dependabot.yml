# Dependabot keeps an eye on dependencies for a project in maintenance mode.
# Grouping minor/patch updates into a single PR per ecosystem keeps the noise
# down to ~1-2 PRs/week. Majors come as their own PRs so they get a real review.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
